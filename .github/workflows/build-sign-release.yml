name: Build, Sign, and Release

# Signing and notarization happen locally via scripts/release.sh.
# This workflow only runs on manual dispatch and is here if CI signing is
# ever set up with GitHub secrets.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: macos-15
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: |
          swift build -c release --arch ${{ matrix.arch }}
          cp .build/${{ matrix.arch }}-apple-macosx/release/mgr mgr-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mgr-${{ matrix.arch }}
          path: mgr-${{ matrix.arch }}

  sign-and-release:
    name: Sign, Notarize, and Release
    runs-on: macos-15
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create universal binary
        run: |
          lipo -create -output mgr \
            mgr-arm64/mgr-arm64 \
            mgr-x86_64/mgr-x86_64

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Code sign
        env:
          SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --strict \
            --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            mgr
          codesign --verify --deep --strict --verbose mgr

      - name: Notarize
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
        run: |
          zip mgr.zip mgr
          xcrun notarytool submit mgr.zip \
            --apple-id "$NOTARIZE_APPLE_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --team-id "$NOTARIZE_TEAM_ID" \
            --wait
          xcrun stapler staple mgr

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          generate_release_notes: true
          files: |
            mgr
            mgr-arm64/mgr-arm64
            mgr-x86_64/mgr-x86_64
            scripts/install.sh
